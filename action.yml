name: lgtmaybe
description: Provider-agnostic PR reviewer — six providers, one flag, no static keys for cloud.
author: Matt Coles
branding:
  icon: check-circle
  color: green

inputs:
  provider:
    description: "LLM provider: openai, anthropic, openrouter, bedrock, vertex, azure, or ollama."
    required: false
    default: ""
  model:
    description: "Model name understood by the chosen provider (e.g. gpt-5.5, claude-sonnet-4-6)."
    required: false
    default: ""
  fallback_model:
    description: "Model to retry with if the primary model fails."
    required: false
    default: ""
  api_key:
    description: "API key for key-based providers (openai/anthropic/openrouter/azure). Leave empty for bedrock/vertex/ollama."
    required: false
    default: ""
  api_base:
    description: "Resource endpoint for azure (https://<resource>.openai.azure.com), or a custom base URL for other providers."
    required: false
    default: ""
  timeout:
    description: "Per-request timeout in seconds for each model call. Leave empty for the provider default (ollama 300, cloud 60)."
    required: false
    default: ""
  temperature:
    description: "Sampling temperature (default 0.0 for deterministic reviews)."
    required: false
    default: ""
  num_ctx:
    description: "Ollama context window (ollama only; ignored for hosted providers). Raise it so a large multi-file diff isn't truncated. Leave empty for the default (16384)."
    required: false
    default: ""
  max_input_tokens:
    description: "Token budget per model call before the diff is split into batches (any provider). Leave empty for the default (100000)."
    required: false
    default: ""
  aws_role_arn:
    description: "IAM role ARN to assume via GitHub OIDC for bedrock. No static AWS key is ever stored."
    required: false
    default: ""
  aws_region:
    description: "AWS region for bedrock (used with aws_role_arn)."
    required: false
    default: "us-east-1"
  gcp_wif_provider:
    description: "GCP Workload Identity Federation provider resource name for vertex."
    required: false
    default: ""
  gcp_service_account:
    description: "GCP service account email to impersonate via WIF (used with gcp_wif_provider)."
    required: false
    default: ""
  azure_client_id:
    description: "Entra (Azure AD) client ID with a federated credential trusting this repo — keyless azure via GitHub OIDC. No static key is stored."
    required: false
    default: ""
  azure_tenant_id:
    description: "Entra (Azure AD) tenant ID for keyless azure (used with azure_client_id)."
    required: false
    default: ""
  config_path:
    description: "Path to the .lgtmaybe.yml config file, relative to the repo root."
    required: false
    default: ".lgtmaybe.yml"
  image:
    description: "Override the container image (advanced; defaults to the released GHCR image)."
    required: false
    default: "ghcr.io/lgtmaybe/lgtmaybe:v0"
  github_token:
    description: "Token used to fetch the diff and post the review. Defaults to the workflow token."
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC, keyless)
      if: ${{ inputs.aws_role_arn != '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Authenticate to Google Cloud (WIF, keyless)
      if: ${{ inputs.gcp_wif_provider != '' }}
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp_wif_provider }}
        service_account: ${{ inputs.gcp_service_account }}

    - name: Federate to Azure (OIDC, keyless)
      if: ${{ inputs.azure_client_id != '' }}
      shell: bash
      env:
        AZURE_CLIENT_ID: ${{ inputs.azure_client_id }}
        AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
      run: |
        set -euo pipefail
        # Exchange the workflow's GitHub OIDC token (needs `id-token: write`) for a
        # file that azure-identity's WorkloadIdentityCredential reads inside the
        # container. No client secret or static key is ever stored.
        token_file="${RUNNER_TEMP}/lgtmaybe-azure-oidc-token"
        resp=$(curl -fsSL \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange")
        python3 -c "import json,sys; sys.stdout.write(json.load(sys.stdin)['value'])" \
          <<<"$resp" > "$token_file"
        {
          echo "AZURE_FEDERATED_TOKEN_FILE=${token_file}"
          echo "AZURE_CLIENT_ID=${AZURE_CLIENT_ID}"
          echo "AZURE_TENANT_ID=${AZURE_TENANT_ID}"
        } >> "$GITHUB_ENV"

    - name: Run lgtmaybe
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_FALLBACK_MODEL: ${{ inputs.fallback_model }}
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_API_BASE: ${{ inputs.api_base }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_TEMPERATURE: ${{ inputs.temperature }}
        INPUT_NUM_CTX: ${{ inputs.num_ctx }}
        INPUT_MAX_INPUT_TOKENS: ${{ inputs.max_input_tokens }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        LGTMAYBE_IMAGE: ${{ inputs.image }}
      run: |
        set -euo pipefail
        docker run --rm \
          -e GITHUB_TOKEN \
          -e GITHUB_EVENT_NAME -e GITHUB_EVENT_PATH \
          -e GITHUB_REPOSITORY -e GITHUB_SERVER_URL \
          -e INPUT_PROVIDER -e INPUT_MODEL -e INPUT_FALLBACK_MODEL \
          -e INPUT_API_KEY -e INPUT_API_BASE -e INPUT_CONFIG_PATH \
          -e INPUT_TIMEOUT -e INPUT_TEMPERATURE \
          -e INPUT_NUM_CTX -e INPUT_MAX_INPUT_TOKENS \
          -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
          -e AWS_REGION -e AWS_DEFAULT_REGION \
          -e GOOGLE_APPLICATION_CREDENTIALS -e GOOGLE_GHA_CREDS_PATH \
          -e CLOUDSDK_CORE_PROJECT -e GOOGLE_CLOUD_PROJECT \
          -e AZURE_FEDERATED_TOKEN_FILE -e AZURE_CLIENT_ID -e AZURE_TENANT_ID \
          -e AZURE_AUTHORITY_HOST \
          -v "${GITHUB_EVENT_PATH}:${GITHUB_EVENT_PATH}:ro" \
          -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
          -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
          -w "${GITHUB_WORKSPACE}" \
          "${LGTMAYBE_IMAGE}" action
