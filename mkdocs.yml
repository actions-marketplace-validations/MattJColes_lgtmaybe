site_name: lgtmaybe
site_description: Provider-agnostic PR reviewer — six providers, one flag, no keys in secrets for cloud.
site_url: https://mattjcoles.github.io/lgtmaybe/
repo_url: https://github.com/MattJColes/lgtmaybe
repo_name: MattJColes/lgtmaybe
edit_uri: edit/main/docs/

docs_dir: docs
# generate_reference.py lives in docs/ as the source for reference/config.md;
# keep it out of the built site.
exclude_docs: |
  generate_reference.py

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Tutorial:
      - Getting started: tutorial/getting-started.md
  - How-to:
      - Run locally with ollama: how-to/run-locally-with-ollama.md
      - Fix findings with an AI agent: how-to/fix-findings-with-an-ai-agent.md
      - Review with Bedrock OIDC: how-to/review-with-bedrock-oidc.md
      - Review with Vertex WIF: how-to/review-with-vertex-wif.md
      - Review with Azure OpenAI: how-to/review-with-azure.md
      - Use as a GitHub Action: how-to/use-as-github-action.md
      - Configure .lgtmaybe.yml: how-to/configure-lgtmaybe-yml.md
      - Releasing (maintainers): how-to/releasing.md
  - Reference:
      - Configuration: reference/config.md
  - Explanation:
      - What gets reviewed: explanation/what-gets-reviewed.md
      - Architecture: explanation/architecture.md
      - Auth model: explanation/auth-model.md
      - Data and privacy: explanation/data-and-privacy.md
