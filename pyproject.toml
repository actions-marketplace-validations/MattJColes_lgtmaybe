[project]
name = "lgtmaybe"
version = "0.0.1"
description = "Provider-agnostic PR reviewer — five providers, one flag, no keys in secrets for cloud."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "Matt Coles" }]
dependencies = [
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/lgtmaybe/lgtmaybe"

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.5",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lgtmaybe"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
python_version = "3.12"
packages = ["lgtmaybe"]
mypy_path = "src"
strict = true
