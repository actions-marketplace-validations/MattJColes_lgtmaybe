name: release

# Fires only on full semver tags (v1.2.3) — never on the floating v1 ref we
# move below, so the major-tag update can't re-trigger this workflow.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Fail fast if the tag and the packaged version disagree.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches pyproject version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $pkg"
            exit 1
          fi
          echo "version $pkg matches tag $GITHUB_REF_NAME"

  pypi:
    needs: guard
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing — no PyPI token in secrets
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  ghcr:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the built-in token
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [pypi, ghcr]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and move the floating major tag
    steps:
      - uses: actions/checkout@v6
      - name: Move floating major tag (e.g. v1)
        run: |
          set -euo pipefail
          major="v${GITHUB_REF_NAME#v}"
          major="${major%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$GITHUB_SHA"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> $GITHUB_SHA"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
