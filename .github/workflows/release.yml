name: release

# Reusable publish workflow. Called by release-please.yml once a Release PR is
# merged and a vX.Y.Z tag + GitHub release have been created. The `tag` input is
# the just-created tag (e.g. v0.1.0); release-please guarantees it matches the
# packaged version, so no tag==version guard is needed here.
on:
  workflow_call:
    inputs:
      tag:
        description: "The released tag to build and publish (e.g. v0.1.0)."
        required: true
        type: string

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing — no PyPI token in secrets
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the built-in token
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern=v{{major}},value=${{ inputs.tag }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Move the floating major tag (e.g. v0) onto the released commit. The GitHub
  # release itself is created by release-please, so we don't create one here.
  floating-tag:
    needs: [pypi, ghcr]
    runs-on: ubuntu-latest
    permissions:
      contents: write # move the floating major tag
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Move floating major tag (e.g. v0)
        run: |
          set -euo pipefail
          major="${{ inputs.tag }}"
          major="${major%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "${{ inputs.tag }}"
          git push -f origin "refs/tags/$major"
          echo "moved $major -> ${{ inputs.tag }}"
