name: commitlint

# Enforce conventional commits on every commit in a PR — release-please relies on
# this format to compute the next version and changelog.
on: pull_request

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
