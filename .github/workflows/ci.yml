name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync (with dev deps)
        run: uv sync --dev

      - name: Lockfile is in sync with pyproject
        run: uv lock --check

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Types
        run: uv run mypy

      - name: Tests
        run: uv run pytest -q
