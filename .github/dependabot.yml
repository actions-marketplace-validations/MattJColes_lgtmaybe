version: 2
updates:
  # GitHub Actions used by the CI workflow and the composite action.yml
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/examples/workflows"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Python dependencies (uv / pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
