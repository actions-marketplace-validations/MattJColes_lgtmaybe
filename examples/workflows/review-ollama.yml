# Copy into your repo at .github/workflows/lgtmaybe.yml
#
# Ollama (fully local, zero cost). The model runs on YOUR machine, so this needs
# a self-hosted runner that can reach an ollama server. There are no secrets and
# nothing leaves your network. This example uses the CLI directly rather than the
# container action so it can talk to ollama on the runner's host.
name: lgtmaybe (ollama, self-hosted)

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: [self-hosted] # a runner with network access to your ollama server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install lgtmaybe
      - name: Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lgtmaybe review \
            --pr-url "${{ github.event.pull_request.html_url }}" \
            --provider ollama \
            --model qwen3.6:27b \
            --api-base http://localhost:11434
