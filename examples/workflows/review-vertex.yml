# Copy into your repo at .github/workflows/lgtmaybe.yml
#
# Google Vertex AI (keyless, via Workload Identity Federation). No GCP key in
# secrets. Set GCP_WIF_PROVIDER (the provider resource name) and
# GCP_SERVICE_ACCOUNT (the SA email to impersonate) repo secrets.
# See docs/how-to/review-with-vertex-wif.md for the one-time GCP setup.
name: lgtmaybe (vertex)

on:
  pull_request_target:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required for the WIF token exchange (keyless auth)

concurrency:
  group: lgtmaybe-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only trusted authors (repo owner / org member / collaborator) can trigger a
    # review, so fork PRs and drive-by /ask or /review comments from strangers
    # cannot spend your provider budget. A maintainer can still opt-in to an
    # external PR by commenting /review on it. (Comments not on a PR are skipped.)
    if: >-
      (github.event_name == 'pull_request_target' &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)) ||
      (github.event.issue.pull_request &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: MattJColes/lgtmaybe@v0
        with:
          provider: vertex
          model: gemini-3-pro
          gcp_wif_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
