# Copy into your repo at .github/workflows/lgtmaybe.yml
#
# Google Vertex AI (keyless, via Workload Identity Federation). No GCP key in
# secrets. Set GCP_WIF_PROVIDER (the provider resource name) and
# GCP_SERVICE_ACCOUNT (the SA email to impersonate) repo secrets.
# See manual-steps.md section B for the one-time GCP setup.
name: lgtmaybe (vertex)

on:
  pull_request_target:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required for the WIF token exchange (keyless auth)

concurrency:
  group: lgtmaybe-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event_name == 'pull_request_target' || github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lgtmaybe/lgtmaybe@v1
        with:
          provider: vertex
          model: gemini-3-pro
          gcp_wif_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
