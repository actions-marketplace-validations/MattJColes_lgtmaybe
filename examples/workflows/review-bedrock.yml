# Copy into your repo at .github/workflows/lgtmaybe.yml
#
# Amazon Bedrock (keyless, via GitHub OIDC). No AWS key in secrets.
# Set an AWS_ROLE_ARN secret pointing at an IAM role whose trust policy is
# scoped to this repo and which has bedrock:InvokeModel* on the model ARNs.
# See docs/how-to/review-with-bedrock-oidc.md for the one-time AWS setup.
name: lgtmaybe (bedrock)

on:
  pull_request_target:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required for the OIDC token exchange (keyless auth)

concurrency:
  group: lgtmaybe-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only trusted authors (repo owner / org member / collaborator) can trigger a
    # review, so fork PRs and drive-by /ask or /review comments from strangers
    # cannot spend your provider budget. A maintainer can still opt-in to an
    # external PR by commenting /review on it. (Comments not on a PR are skipped.)
    if: >-
      (github.event_name == 'pull_request_target' &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)) ||
      (github.event.issue.pull_request &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: MattJColes/lgtmaybe@v0
        with:
          provider: bedrock
          model: anthropic.claude-sonnet-4-6
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: us-east-1
